<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Watson</title>

<!-- PWA install metadata -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#121118" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Watson" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" href="icon-192.png" />

<style>
  html, body, #root { height: 100%; margin: 0; background: #121118; }
  * { -webkit-tap-highlight-color: transparent; }
</style>

<!-- Tailwind (JIT, browser build — fine for a small standalone tool, swap for a real build step if this grows) -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- React + ReactDOM (UMD builds, no bundler needed) -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

<!-- Babel standalone: transforms the JSX in app.jsx right in the browser -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react" src="app.jsx"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
